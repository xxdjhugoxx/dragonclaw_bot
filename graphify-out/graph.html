<!DOCTYPE html>
<html>
<head>
  <title>🐉 DRAGONCLAW Brain</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0A0A0A; font-family: 'Inter', sans-serif; overflow: hidden; }
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      border-bottom: 1px solid rgba(245,240,232,0.05);
    }
    #header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #F5F0E8;
      letter-spacing: 2px;
    }
    #header h1 span { color: #6B1C2A; }
    #mynetwork { width: 100%; height: 100%; }
    #sidebar {
      position: fixed;
      top: 60px;
      right: 0;
      bottom: 0;
      width: 350px;
      background: rgba(20,20,20,0.98);
      border-left: 1px solid rgba(245,240,232,0.05);
      padding: 24px;
      overflow-y: auto;
      display: none;
      z-index: 999;
    }
    #sidebar.show { display: block; }
    #sidebar h2 { font-size: 14px; font-weight: 600; color: #6B1C2A; letter-spacing: 2px; margin-bottom: 16px; }
    #sidebar pre { font-size: 12px; color: #F5F0E8; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    #close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: #F5F0E8;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.5;
    }
    #close-btn:hover { opacity: 1; }
    #instructions {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(20,20,20,0.9);
      padding: 16px 20px;
      border-radius: 8px;
      border: 1px solid rgba(245,240,232,0.1);
      font-size: 11px;
      color: rgba(245,240,232,0.6);
      line-height: 1.8;
    }
    #instructions strong { color: #F5F0E8; }
    .legend {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(20,20,20,0.9);
      padding: 16px 20px;
      border-radius: 8px;
      border: 1px solid rgba(245,240,232,0.1);
      font-size: 11px;
      color: rgba(245,240,232,0.6);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .legend-dot.file { background: #F5F0E8; }
    .legend-dot.concept { background: #6B1C2A; }
    .legend-dot.ref { background: #3a3a3a; }
  </style>
</head>
<body>

<div id="header">
  <h1>🐉 <span>DRAGONCLAW</span> KNOWLEDGE BRAIN</h1>
</div>

<div id="mynetwork"></div>

<div id="sidebar">
  <button id="close-btn" onclick="closeSidebar()">×</button>
  <h2 id="nodeTitle">Node</h2>
  <pre id="nodeContent">Click a node to see details</pre>
</div>

<div id="instructions">
  <strong>Click</strong> node to view content<br>
  <strong>Drag</strong> to move nodes<br>
  <strong>Scroll</strong> to zoom<br>
  <strong>Double-click</strong> empty space to reset
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot file"></div> File / Document</div>
  <div class="legend-item"><div class="legend-dot concept"></div> Concept / Topic</div>
  <div class="legend-item"><div class="legend-dot ref"></div> Connection</div>
</div>

<script>
const nodes = new vis.DataSet([
  { id: 1, label: 'IAM Brand', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 2, label: 'DRAGONCLAW', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 3, label: 'Memory System', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 4, label: '2026-04-25', group: 'file', color: { background: '#F5F0E8', border: '#6B1C2A' } },
  { id: 5, label: 'MEMORY.md', group: 'file', color: { background: '#F5F0E8', border: '#6B1C2A' } },
  { id: 6, label: 'Identity', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 7, label: 'Projects', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 8, label: 'Hugo Ferrari', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 9, label: 'Shop System', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 10, label: 'Admin Portal', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 11, label: 'Client Portal', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 12, label: 'API Server', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 13, label: 'specOPS', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 14, label: 'Supabase', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 15, label: 'Boca Raton', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
  { id: 16, label: 'GitHub', group: 'concept', color: { background: '#6B1C2A', border: '#F5F0E8' } },
]);

const edges = new vis.DataSet([
  { from: 1, to: 2, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 1, to: 9, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 1, to: 10, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 1, to: 11, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 2, to: 3, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 2, to: 6, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 2, to: 8, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 3, to: 4, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 3, to: 5, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 4, to: 7, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 5, to: 6, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 5, to: 7, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 6, to: 8, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 7, to: 1, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 7, to: 13, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 8, to: 15, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 9, to: 12, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 9, to: 14, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 10, to: 12, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 11, to: 14, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 13, to: 14, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 12, to: 16, color: { color: 'rgba(245,240,232,0.2)' } },
  { from: 16, to: 1, color: { color: 'rgba(245,240,232,0.2)' } },
]);

const container = document.getElementById('mynetwork');
const data = { nodes: nodes, edges: edges };
const options = {
  nodes: {
    shape: 'dot',
    size: 20,
    font: { color: '#F5F0E8', size: 14, face: 'Inter' },
    borderWidth: 2,
    shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 10 }
  },
  edges: {
    width: 1.5,
    color: { color: 'rgba(245,240,232,0.2)' },
    smooth: { type: 'continuous' }
  },
  physics: {
    enabled: true,
    barnesHut: { gravitationalConstant: -3000, springConstant: 0.04, damping: 0.09 }
  },
  interaction: {
    hover: true,
    tooltipDelay: 100,
    zoomView: true,
    dragView: true
  }
};

const network = new vis.Network(container, data, options);

// Click node to show content
const nodeContent = {
  1: 'Christian streetwear brand. Varsity block logo, maroon + cream. Faith In Every Thread.',
  2: 'DRAGONCLAW - Hugo\'s AI co-founder. Running 24/7 on Telegram. Identity stored in system/IDENTITY.md',
  3: 'Permanent memory vault at ~/dragonclaw_bot/. Every session logged. Obsidian/Graphify ready.',
  4: 'Today\'s session: Created memory vault. Discussed IAM backend. Hugo wants permanent brain.',
  5: 'Long-term memory. Curated summary of all projects, decisions, people, and goals.',
  6: 'DRAGONCLAW Identity: Name, owner, personality, stack, skills, critical rules.',
  7: 'IAM (clothing), specOPS (fitness app). Each project has SPEC.md in projects/.',
  8: 'Hugo Ferrari - Software dev, Boca Raton FL. React Native, Expo, Supabase, Stripe. Direct, knows what he wants.',
  9: 'shop.html - Product catalog, cart, checkout. Client-side only without backend.',
  10: 'admin.html - Admin scan & ship. Tracks orders. Sends email notifications.',
  11: 'client-portal.html - Clients track orders by email. See status + tracking ID.',
  12: 'Express API at ~/IAM/api/server.js. Runs on port 3001. Needs 24/7 deployment.',
  13: 'Fitness AI app with Supabase. 16 screens built. Stack: RN + Expo + Supabase.',
  14: 'Database backend for IAM and specOPS. Schema ready at supabase/schema.sql.',
  15: 'Hugo\'s location. EST timezone. Server is local at 192.168.0.207.',
  16: 'All repos on xxdjhugoxx account. GitHub Pages enabled for IAM and dragonclaw_bot.'
};

network.on('click', function (params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    document.getElementById('nodeTitle').textContent = nodes.get(nodeId).label;
    document.getElementById('nodeContent').textContent = nodeContent[nodeId] || 'No additional info.';
    document.getElementById('sidebar').classList.add('show');
  } else {
    document.getElementById('sidebar').classList.remove('show');
  }
});

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('show');
}

network.on('doubleClick', function (params) {
  if (params.nodes.length === 0) {
    network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
  }
});
</script>

</body>
</html>
